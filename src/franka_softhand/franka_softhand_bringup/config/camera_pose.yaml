# Posa della RealSense D435i rispetto al frame "world", + bounding box per il
# collision object aggiunto alla planning scene MoveIt.
#
# Letto da: franka_softhand_bringup/scripts/camera_in_scene.py
# Lanciato da: roslaunch franka_softhand_bringup camera_in_scene.launch
#
# COPIA I VALORI dal `.launch` salvato dal pannello moveit_calibration:
#   <node ... args="X Y Z   QX QY QZ QW world camera_link" />
#
# Lo script preferisce il quaternion (qx/qy/qz/qw) all'rpy. Se vuoi inserire
# l'orientamento in rpy (URDF, extrinsic XYZ), commenta il blocco quaternion e
# scommenta quello rpy.

camera_pose:
  # Posizione (m) — primi 3 numeri del campo `args`
  x:   0.135 # 095341
  y:  -0.31711 # -0.346711
  z:   0.51 # 594690

  # Orientamento — copia gli ULTIMI 4 numeri del campo `args` (qx qy qz qw)
  qx: -0.151022
  qy:  0.455932
  qz:  0.287622
  qw:  0.828609

  # Alternativa: orientamento in rpy URDF (rad). Lascia commentato se usi quat.
  # roll:  0.0
  # pitch: 0.0
  # yaw:   0.0

# Box di collisione approssimante il corpo della D435i.
# Centro espresso nel frame "camera_link"; size = (sx, sy, sz) in m.
camera_collision:
  size:   [0.025, 0.09, 0.025]
  offset: [0.0,   0.0,   0.0]
